<!doctype html>
<!--
  OPMEETAPP V32 - OPGESCHOOND VANAF V29_1
  - Alleen Excel-berekening behouden
  - Overbodige opties weggehaald 
  - UI verbeterd maar berekening intact
-->
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stadsontwikkeling - Publieke ruimte - Stad Antwerpen OPMEETAPP (V32)</title>
<style>
  :root{ --ant-red:#e1001a; --border:#e5e7eb; --muted:#6b7280; --bg:#f3f4f6; }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:#111827}
  
  header{position:sticky;top:0;z-index:10;background:#fff;padding:12px 16px;border-bottom:3px solid var(--ant-red);display:flex;align-items:center;justify-content:space-between;gap:8px}
  header .logo-title{display:flex;align-items:center;gap:12px}
  header .logo{width:40px;height:40px;background:url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjQwIiBoZWlnaHQ9IjQwIiByeD0iNiIgZmlsbD0iI2UxMDAxYSIvPgo8cGF0aCBkPSJNMTIgMTJIMjhWMjhIMTJWMTJaIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiLz4KPHN2Zz4K') center/contain no-repeat}
  header h1{margin:0;font-size:18px;font-weight:700}
  header .actions{display:flex;gap:8px}
  
  main{display:grid;grid-template-columns:420px 1fr;gap:16px;padding:16px}
  @media (max-width:1100px){main{grid-template-columns:1fr}}
  
  .card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .pane{padding:16px}
  
  .row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .row h2{margin:4px 0 0 0;font-size:14px;font-weight:600}
  
  label{font-size:12px;color:#374151;display:flex;flex-direction:column;gap:4px}
  input,select{padding:8px 10px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:13px}
  input[type="number"]{width:120px}
  
  .btn{padding:8px 12px;border-radius:100px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s}
  .btn:hover{background:#f9fafb;transform:translateY(-1px)}
  .btn.primary{background:var(--ant-red);color:#fff;border-color:var(--ant-red)}
  .btn.primary:hover{background:#c8001a}
  .btn.active{background:var(--ant-red);color:#fff;border-color:var(--ant-red);box-shadow:0 0 0 3px rgba(225,0,26,0.25)}
  .btn.secondary{background:#f3f4f6;color:#374151}
  
  .settings-panel{display:none;background:#f9fafb;border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px}
  .settings-panel.show{display:block}
  
  .tools-section{margin:16px 0}
  .tools-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  
  .plan-container{position:relative}
  .grid-wrap{padding:16px;position:relative}
  .plan{background:#fff;border-radius:16px;box-shadow:inset 0 0 0 1px var(--border),0 1px 6px rgba(0,0,0,.06);width:100%;height:600px;touch-action:none;display:block;cursor:crosshair}
  
  /* Nieuwe samenvatting stijlen */
  .summary-container {
    margin-top: 20px;
  }
  .summary-section {
    margin-bottom: 20px;
  }
  .summary-section h3 {
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 12px 0;
    color: #111827;
  }
  .kpi-grid{display:grid;gap:12px}
  .kpi-large {
    background:#f9fafb;
    border:1px solid var(--border);
    border-radius:12px;
    padding: 16px;
    transition:all 0.2s;
  }
  .kpi-large:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  .kpi-large h4 {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    color: #6b7280;
  }
  .kpi-large p {
    margin: 6px 0 0 0;
    font-size: 20px;
    font-weight: 600;
  }
  .kpi-total {
    background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
    border-color: #93c5fd;
  }
  .kpi-total h4 {
    font-weight: 600;
    color: #1e40af;
  }
  .kpi-total p {
    font-weight: 700;
    color: #1e40af;
    font-size: 24px;
  }
  
  .status-bar{background:#f1f5f9;border-top:1px solid #e2e8f0;padding:8px 16px;font-size:12px;color:#64748b;text-align:center}
</style>
</head>
<body>
<header>
  <div class="logo-title">
    <div class="logo"></div>
    <h1>OPMEETAPP - Stad Antwerpen</h1>
  </div>
  <div class="actions">
    <button class="btn primary" id="btnPDF">📄 PDF</button>
    <button class="btn" id="btnUndo">↶</button>
    <button class="btn" id="btnRedo">↷</button>
    <button class="btn secondary" id="btnClear">🗑️ Wissen</button>
  </div>
</header>

<main>
  <div class="card">
    <div class="pane">
      <div class="row">
        <h2>Configuratie</h2>
        <button class="btn" id="btnSettings">⚙️ Instellingen</button>
      </div>
      
      <div class="settings-panel" id="settingsPanel">
        <div class="row">
          <label>Buffer (m)<input type="number" id="buffer" value="0.30" min="0" max="2" step="0.05"></label>
          <label>Min. zone (m²)<input type="number" id="minZone" value="1.00" min="0" max="10" step="0.25"></label>
        </div>
        
        <div class="row">
          <label>Grid Breedte (m)<input type="number" id="cellWidth" value="0.25" min="0.1" max="2" step="0.05"></label>
          <label>Grid Hoogte (m)<input type="number" id="cellHeight" value="0.25" min="0.1" max="2" step="0.05"></label>
        </div>
        
        <div class="row">
          <label>V-tarief (€/m²)<input type="number" id="rateV" value="180.00" min="0" step="0.01"></label>
          <label>H-tarief (€/m²)<input type="number" id="rateH" value="120.00" min="0" step="0.01"></label>
        </div>
      </div>

      <div class="tools-section">
        <h3>Tekenen</h3>
        <div class="tools-grid">
          <button class="btn" id="toolV">🟥 V-zone</button>
          <button class="btn" id="toolH">🟦 H-zone</button>
          <button class="btn" id="toolE">🧽 Gum</button>
        </div>
      </div>

      <div class="summary-container">
        <div class="summary-section">
          <h3>Berekening (Excel-formule)</h3>
          
          <div class="kpi-grid">
            <div class="kpi-large">
              <h4>V-zone offset</h4>
              <p id="m2VReg">0,00 m²</p>
            </div>
            
            <div class="kpi-large">
              <h4>H-zone offset</h4>
              <p id="m2HReg">0,00 m²</p>
            </div>
            
            <div class="kpi-large kpi-total">
              <h4>TOTAAL (incl. 21% BTW)</h4>
              <p id="totalEuro">€ 0,00</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="plan-container">
      <div class="grid-wrap">
        <canvas id="plan" class="plan" width="800" height="600"></canvas>
      </div>
    </div>
  </div>
</main>

<div class="status-bar">
  <span id="statusText">Excel-berekening actief • Teken 1×1m V-zone en H-zone voor test</span>
</div>

<script>
// === CONSTANTS & SETTINGS ===
const settings = {
  cellWidth: 0.25,
  cellHeight: 0.25,
  rows: 20,
  cols: 20,
  buffer: 0.30,
  minZone: 1.0,
  rateV: 180.00,
  rateH: 120.00,
  vatRatePct: 21.0
};

// === GLOBAL STATE ===
let grid = [];
let history = [];
let historyIndex = -1;
let currentTool = 'V';
let isDrawing = false;
let hasOverlap = false; // Voor Excel-berekening

// === DOM ELEMENTS ===
const canvas = document.getElementById('plan');
const ctx = canvas.getContext('2d');
const bufferEl = document.getElementById('buffer');
const minZoneEl = document.getElementById('minZone');
const cellWidthEl = document.getElementById('cellWidth');
const cellHeightEl = document.getElementById('cellHeight');
const rateVEl = document.getElementById('rateV');
const rateHEl = document.getElementById('rateH');
const toolVBtn = document.getElementById('toolV');
const toolHBtn = document.getElementById('toolH');
const toolEBtn = document.getElementById('toolE');
const btnSettings = document.getElementById('btnSettings');
const settingsPanel = document.getElementById('settingsPanel');
const statusText = document.getElementById('statusText');

// === INITIALIZATION ===
function initGrid() {
  grid = [];
  for (let r = 0; r < settings.rows; r++) {
    grid[r] = [];
    for (let c = 0; c < settings.cols; c++) {
      grid[r][c] = null;
    }
  }
}

function saveToHistory() {
  historyIndex++;
  history = history.slice(0, historyIndex);
  history.push(JSON.parse(JSON.stringify(grid)));
  if (history.length > 50) {
    history.shift();
    historyIndex--;
  }
}

function updateFromInputs() {
  settings.buffer = parseFloat(bufferEl.value) || 0.30;
  settings.minZone = parseFloat(minZoneEl.value) || 1.0;
  settings.cellWidth = parseFloat(cellWidthEl.value) || 0.25;
  settings.cellHeight = parseFloat(cellHeightEl.value) || 0.25;
  settings.rateV = parseFloat(rateVEl.value) || 180.0;
  settings.rateH = parseFloat(rateHEl.value) || 120.0;
}

// === EXCEL CALCULATION ===
function calculateAreas() {
  const cw = settings.cellWidth;
  const ch = settings.cellHeight;
  const bufferM = settings.buffer;
  
  // Find all V and H zones
  const vCells = [];
  const hCells = [];
  
  for (let r = 0; r < settings.rows; r++) {
    for (let c = 0; c < settings.cols; c++) {
      if (grid[r][c] === 'V') vCells.push([r, c]);
      if (grid[r][c] === 'H') hCells.push([r, c]);
    }
  }
  
  // Check overlap
  hasOverlap = vCells.length > 0 && hCells.length > 0;
  
  // Calculate net areas
  const vNetto = vCells.length * cw * ch;
  const hNetto = hCells.length * cw * ch;
  
  // Excel buffer calculation
  let vBuffer = 0;
  let hBuffer = 0;
  
  if (vCells.length > 0) {
    const vBounds = getBounds(vCells);
    const vWidth = (vBounds.maxC - vBounds.minC + 1) * cw;
    const vHeight = (vBounds.maxR - vBounds.minR + 1) * ch;
    const vMaxDim = Math.max(vWidth, vHeight);
    
    const vSideStrips = 3 * bufferM * vMaxDim;
    const vCorners = 4 * bufferM * bufferM; // V-zone krijgt altijd hoeken
    vBuffer = vSideStrips + vCorners;
    
    console.log(`V-zone: ${vWidth.toFixed(2)}×${vHeight.toFixed(2)}m, stroken=${vSideStrips.toFixed(3)}, hoeken=${vCorners.toFixed(3)}, buffer=${vBuffer.toFixed(3)}`);
  }
  
  if (hCells.length > 0) {
    const hBounds = getBounds(hCells);
    const hWidth = (hBounds.maxC - hBounds.minC + 1) * cw;
    const hHeight = (hBounds.maxR - hBounds.minR + 1) * ch;
    const hMaxDim = Math.max(hWidth, hHeight);
    
    const hSideStrips = 3 * bufferM * hMaxDim;
    const hCorners = hasOverlap ? 0 : (4 * bufferM * bufferM); // Geen hoeken bij overlap
    hBuffer = hSideStrips + hCorners;
    
    console.log(`H-zone: ${hWidth.toFixed(2)}×${hHeight.toFixed(2)}m, stroken=${hSideStrips.toFixed(3)}, hoeken=${hCorners.toFixed(3)}, buffer=${hBuffer.toFixed(3)}`);
  }
  
  // Calculate totals (ALLEEN OFFSET TONEN)
  const vOffset = vBuffer;
  const hOffset = hBuffer;
  
  const vEuro = (vNetto + vOffset) * settings.rateV;
  const hEuro = (hNetto + hOffset) * settings.rateH;
  const totalExclBtw = vEuro + hEuro;
  const btw = totalExclBtw * (settings.vatRatePct / 100);
  const totalInclBtw = totalExclBtw + btw;
  
  // Update UI - ALLEEN OFFSET
  document.getElementById('m2VReg').textContent = vOffset.toFixed(2).replace('.', ',') + ' m²';
  document.getElementById('m2HReg').textContent = hOffset.toFixed(2).replace('.', ',') + ' m²';
  document.getElementById('totalEuro').textContent = '€ ' + totalInclBtw.toFixed(2).replace('.', ',');
  
  // Update status
  const totalCells = vCells.length + hCells.length;
  if (totalCells > 0) {
    statusText.textContent = `Excel-berekening: ${totalCells} cellen • V-offset: ${vOffset.toFixed(2)}m² • H-offset: ${hOffset.toFixed(2)}m²`;
  } else {
    statusText.textContent = 'Excel-berekening actief • Teken 1×1m V-zone en H-zone voor test';
  }
  
  console.log(`RESULTAAT: V-offset=${vOffset.toFixed(2)}m², H-offset=${hOffset.toFixed(2)}m², Totaal=€${totalInclBtw.toFixed(2)}`);
}

function getBounds(cells) {
  if (cells.length === 0) return { minR: 0, maxR: 0, minC: 0, maxC: 0 };
  
  let minR = cells[0][0], maxR = cells[0][0];
  let minC = cells[0][1], maxC = cells[0][1];
  
  for (const [r, c] of cells) {
    minR = Math.min(minR, r);
    maxR = Math.max(maxR, r);
    minC = Math.min(minC, c);
    maxC = Math.max(maxC, c);
  }
  
  return { minR, maxR, minC, maxC };
}

// === DRAWING ===
function draw() {
  const rect = canvas.getBoundingClientRect();
  const scale = Math.min(rect.width / (settings.cols * settings.cellWidth), rect.height / (settings.rows * settings.cellHeight));
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const cellPxW = settings.cellWidth * scale;
  const cellPxH = settings.cellHeight * scale;
  
  // Draw grid
  ctx.strokeStyle = '#e5e7eb';
  ctx.lineWidth = 1;
  
  for (let r = 0; r <= settings.rows; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * cellPxH);
    ctx.lineTo(settings.cols * cellPxW, r * cellPxH);
    ctx.stroke();
  }
  
  for (let c = 0; c <= settings.cols; c++) {
    ctx.beginPath();
    ctx.moveTo(c * cellPxW, 0);
    ctx.lineTo(c * cellPxW, settings.rows * cellPxH);
    ctx.stroke();
  }
  
  // Draw cells
  for (let r = 0; r < settings.rows; r++) {
    for (let c = 0; c < settings.cols; c++) {
      const cell = grid[r][c];
      if (cell) {
        ctx.fillStyle = cell === 'V' ? '#ffcdd2' : cell === 'H' ? '#bbdefb' : '#fff';
        ctx.fillRect(c * cellPxW, r * cellPxH, cellPxW, cellPxH);
      }
    }
  }
}

function getCellFromMouse(e) {
  const rect = canvas.getBoundingClientRect();
  const scale = Math.min(rect.width / (settings.cols * settings.cellWidth), rect.height / (settings.rows * settings.cellHeight));
  
  const cellPxW = settings.cellWidth * scale;
  const cellPxH = settings.cellHeight * scale;
  
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  const c = Math.floor(x / cellPxW);
  const r = Math.floor(y / cellPxH);
  
  if (r >= 0 && r < settings.rows && c >= 0 && c < settings.cols) {
    return [r, c];
  }
  return null;
}

function setCell(r, c, value) {
  if (r >= 0 && r < settings.rows && c >= 0 && c < settings.cols) {
    grid[r][c] = value;
  }
}

// === EVENT HANDLERS ===
canvas.addEventListener('mousedown', (e) => {
  const cell = getCellFromMouse(e);
  if (cell) {
    isDrawing = true;
    const [r, c] = cell;
    if (currentTool === 'E') {
      setCell(r, c, null);
    } else {
      setCell(r, c, currentTool);
    }
    draw();
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (isDrawing) {
    const cell = getCellFromMouse(e);
    if (cell) {
      const [r, c] = cell;
      if (currentTool === 'E') {
        setCell(r, c, null);
      } else {
        setCell(r, c, currentTool);
      }
      draw();
    }
  }
});

canvas.addEventListener('mouseup', () => {
  if (isDrawing) {
    isDrawing = false;
    saveToHistory();
    calculateAreas();
  }
});

// Tool buttons
toolVBtn.addEventListener('click', () => {
  currentTool = 'V';
  document.querySelectorAll('.tools-grid .btn').forEach(b => b.classList.remove('active'));
  toolVBtn.classList.add('active');
});

toolHBtn.addEventListener('click', () => {
  currentTool = 'H';
  document.querySelectorAll('.tools-grid .btn').forEach(b => b.classList.remove('active'));
  toolHBtn.classList.add('active');
});

toolEBtn.addEventListener('click', () => {
  currentTool = 'E';
  document.querySelectorAll('.tools-grid .btn').forEach(b => b.classList.remove('active'));
  toolEBtn.classList.add('active');
});

// Settings toggle
btnSettings.addEventListener('click', () => {
  settingsPanel.classList.toggle('show');
  btnSettings.classList.toggle('active');
});

// Input changes
bufferEl.addEventListener('change', () => { updateFromInputs(); calculateAreas(); });
minZoneEl.addEventListener('change', () => { updateFromInputs(); calculateAreas(); });
cellWidthEl.addEventListener('change', () => { updateFromInputs(); draw(); calculateAreas(); });
cellHeightEl.addEventListener('change', () => { updateFromInputs(); draw(); calculateAreas(); });
rateVEl.addEventListener('change', () => { updateFromInputs(); calculateAreas(); });
rateHEl.addEventListener('change', () => { updateFromInputs(); calculateAreas(); });

// Initialize
function init() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  
  initGrid();
  saveToHistory();
  toolVBtn.classList.add('active');
  draw();
  calculateAreas();
  
  // Set initial values
  bufferEl.value = settings.buffer;
  minZoneEl.value = settings.minZone;
  cellWidthEl.value = settings.cellWidth;
  cellHeightEl.value = settings.cellHeight;
  rateVEl.value = settings.rateV;
  rateHEl.value = settings.rateH;
}

// Start when loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

console.log('OPMEETAPP V32 geladen - opgeschoonde V29_1 met Excel-berekening');
</script>
</body>
</html>
