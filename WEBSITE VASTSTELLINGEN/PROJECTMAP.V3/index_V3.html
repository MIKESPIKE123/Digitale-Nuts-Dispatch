<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beheer Vaststellingen</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    body { font-family: 'Antwerpen', sans-serif; margin: 20px; background-color: #f4f4f9; }
    nav.container-fluid { background-color: #004080; color: white; }
    nav.container-fluid ul { display: flex; justify-content: space-between; list-style-type: none; padding: 0; margin: 0; }
    nav.container-fluid ul li { padding: 10px 20px; }
    nav.container-fluid ul li a { color: white; text-decoration: none; }
    form, section { background: #fff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
    .button-group { display: inline-flex; gap: 10px; }
    .small-button { font-size: 0.8rem; padding: 5px 10px; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 30px; }
    .menu-grid a { padding: 10px; background-color: #004080; color: white; text-align: center; border-radius: 8px; text-decoration: none; }
    .menu-grid a:hover { background-color: #003366; }
    .scroll-top { display: block; margin: 20px auto; padding: 10px 20px; background-color: #004080; color: white; border-radius: 8px; text-decoration: none; text-align: center; width: fit-content; }
    .scroll-top:hover { background-color: #003366; }
  </style>
</head>
<body>

<nav class="container-fluid">
  <ul>
    <li><strong>stad Antwerpen</strong></li>
  </ul>
</nav>

<main class="container">

  <h1>Hoofdmenu Beheer</h1>
  <div class="menu-grid">
    <a href="#vaststellers">Vaststellers beheren</a>
    <a href="#postcodes">Postcodes beheren</a>
    <a href="#types">Types Nutsmaatschappijen beheren</a>
    <a href="#nuts">Nutsmaatschappijen beheren</a>
  </div>

  <h2 id="vaststellers">Vaststellers beheren</h2>
  <section>
    <ul id="vaststellers-list"></ul>
    <form id="add-form">
      <label for="new-name">Nieuwe vaststeller toevoegen:</label>
      <input type="text" id="new-name" required>
      <button type="submit">Toevoegen</button>
    </form>
  </section>

  <h2 id="postcodes">Postcodes beheren</h2>
  <section>
    <ul id="postcodes-list"></ul>
    <form id="add-postcode-form">
      <label for="new-postcode">Nieuwe postcode toevoegen:</label>
      <input type="text" id="new-postcode" required>
      <button type="submit">Toevoegen</button>
    </form>
  </section>

  <h2 id="types">Types Nutsmaatschappijen beheren</h2>
  <section>
    <ul id="types-list"></ul>
    <form id="add-type-form">
      <label for="new-type">Nieuw type toevoegen:</label>
      <input type="text" id="new-type" required>
      <button type="submit">Toevoegen</button>
    </form>
  </section>

  <h2 id="nuts">Nutsmaatschappijen beheren</h2>
  <section>
    <ul id="nuts-list"></ul>
    <form id="add-nuts-form">
      <label for="new-nuts">Nieuwe nutsmaatschappij toevoegen:</label>
      <input type="text" id="new-nuts" required>
      <button type="submit">Toevoegen</button>
    </form>
  </section>

  <a href="#top" class="scroll-top">Terug naar boven</a>

</main>

<script>
// Hier blijft jouw bestaande JavaScript-code staan (zoals eerder gedeeld)
</script>

</body>
</html>
