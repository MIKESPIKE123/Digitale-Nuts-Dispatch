<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Quick Test</title>
</head>
<body>
    <h1>Quick Script Test</h1>
    <div id="log"></div>

    <script>
        function log(msg) {
            document.getElementById('log').innerHTML += '<p>' + msg + '</p>';
            console.log(msg);
        }

        log('Starting test...');
    </script>

    <!-- Test loading one script at a time -->
    <script src="src/state/formState.js"></script>
    
    <script>
        setTimeout(() => {
            log('FormStateManager type: ' + typeof window.formStateManager);
            log('FormStateManager available: ' + (window.formStateManager ? 'YES' : 'NO'));
            
            if (window.formStateManager) {
                log('FormStateManager methods:');
                log('- getState: ' + typeof window.formStateManager.getState);
                log('- updateState: ' + typeof window.formStateManager.updateState);
                log('- setSchema: ' + typeof window.formStateManager.setSchema);
            }
        }, 100);
    </script>
</body>
</html>
