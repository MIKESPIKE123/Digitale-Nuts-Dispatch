<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config System Test - Vaststellingen</title>
    
    <!-- Antwerp Core Branding 7.1.0 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@a-ui/core@7.1.0/dist/main.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="u-container">
        <header class="u-margin-bottom-lg">
            <h1 class="h2 u-text-center">
                🧪 Config-Driven Form System Test
            </h1>
            <p class="u-text-center u-text-muted">
                Test pagina voor het nieuwe configuratie-gestuurde formulier systeem
            </p>
        </header>

        <div class="a-panel">
            <div class="a-panel__body">
                <h2 class="h4">System Status</h2>
                <div id="systemStatus">
                    <p>⏳ Loading system components...</p>
                </div>
            </div>
        </div>

        <div class="a-panel u-margin-top">
            <div class="a-panel__body">
                <h2 class="h4">Config Form Test</h2>
                <div class="u-margin-bottom">
                    <button type="button" class="a-button a-button--primary u-margin-right-xs" onclick="renderTestForm()">
                        🚀 Render Config Form
                    </button>
                    <button type="button" class="a-button a-button--secondary u-margin-right-xs" onclick="showFormState()">
                        📊 Show State
                    </button>
                    <button type="button" class="a-button a-button--outline" onclick="resetTestForm()">
                        🔄 Reset
                    </button>
                </div>
                
                <div id="testFormContainer">
                    <!-- Config form will be rendered here -->
                </div>
            </div>
        </div>

        <div class="a-panel u-margin-top">
            <div class="a-panel__body">
                <h2 class="h4">System Logs</h2>
                <div id="systemLogs" style="background: #f8f9fa; padding: 1rem; border-radius: 4px; font-family: monospace; max-height: 300px; overflow-y: auto;">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Config-Driven System Scripts -->
    <script src="src/state/formState.js"></script>
    <script src="src/state/visibility.js"></script>
    <script src="src/ui/formRenderer.js"></script>
    <script src="src/services/historyStore.js"></script>
    <script src="src/services/export.js"></script>

    <script>
        let formSchema = null;
        let formRenderer = null;
        let systemReady = false;

        // Logging function
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${type.toUpperCase()}: ${message}`;
            console.log(logEntry);
            
            const logsContainer = document.getElementById('systemLogs');
            const logElement = document.createElement('div');
            logElement.style.color = type === 'error' ? '#e60000' : type === 'success' ? '#009639' : '#333';
            logElement.textContent = logEntry;
            logsContainer.appendChild(logElement);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        // Initialize the config system
        async function initConfigSystem() {
            try {
                log('Starting config system initialization...');
                
                // Load form schema
                log('Loading form schema from config/form.schema.json...');
                const response = await fetch('./config/form.schema.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                formSchema = await response.json();
                log(`Schema loaded successfully - ${formSchema.blocks?.length || 0} blocks found`, 'success');
                
                // Check if managers are available
                if (!window.formStateManager) {
                    throw new Error('FormStateManager not available');
                }
                if (!window.visibilityManager) {
                    throw new Error('VisibilityManager not available');
                }
                if (!window.exportService) {
                    throw new Error('ExportService not available');
                }
                
                // Initialize managers
                log('Initializing state manager...');
                window.formStateManager.setSchema(formSchema);
                
                log('Initializing visibility manager...');
                window.visibilityManager.setSchema(formSchema);
                
                log('Initializing export service...');
                window.exportService.init(window.formStateManager);
                
                // Initialize renderer
                log('Initializing form renderer...');
                formRenderer = new FormRenderer();
                formRenderer.init(formSchema, window.formStateManager, window.visibilityManager);
                
                systemReady = true;
                log('✅ Config system initialization complete!', 'success');
                updateSystemStatus();
                
            } catch (error) {
                log(`❌ Config system initialization failed: ${error.message}`, 'error');
                updateSystemStatus(error);
            }
        }

        function updateSystemStatus(error = null) {
            const statusContainer = document.getElementById('systemStatus');
            
            if (error) {
                statusContainer.innerHTML = `
                    <div class="a-alert a-alert--danger">
                        <div class="a-alert__content">
                            <p class="a-alert__message">
                                ❌ <strong>System Error:</strong> ${error.message}
                            </p>
                        </div>
                    </div>
                `;
            } else if (systemReady) {
                statusContainer.innerHTML = `
                    <div class="a-alert a-alert--success">
                        <div class="a-alert__content">
                            <p class="a-alert__message">
                                ✅ <strong>System Ready:</strong> All components loaded successfully
                            </p>
                        </div>
                    </div>
                    <div class="u-margin-top">
                        <p><strong>Schema Blocks:</strong> ${formSchema.blocks.length}</p>
                        <p><strong>State Manager:</strong> ✅ Active</p>
                        <p><strong>Visibility Manager:</strong> ✅ Active</p>
                        <p><strong>Form Renderer:</strong> ✅ Active</p>
                        <p><strong>Export Service:</strong> ✅ Active</p>
                        <p><strong>History Store:</strong> ✅ Active</p>
                    </div>
                `;
            } else {
                statusContainer.innerHTML = `
                    <div class="a-alert a-alert--warning">
                        <div class="a-alert__content">
                            <p class="a-alert__message">
                                ⏳ <strong>Loading:</strong> Initializing system components...
                            </p>
                        </div>
                    </div>
                `;
            }
        }

        // Test functions
        window.renderTestForm = function() {
            if (!systemReady || !formRenderer) {
                log('Cannot render form - system not ready', 'error');
                return;
            }

            try {
                log('Rendering config form...');
                formRenderer.render('testFormContainer');
                log('Form rendered successfully', 'success');
            } catch (error) {
                log(`Form render error: ${error.message}`, 'error');
            }
        };

        window.showFormState = function() {
            if (!systemReady || !window.formStateManager) {
                log('Cannot show state - system not ready', 'error');
                return;
            }

            const state = window.formStateManager.getState();
            log('Current form state retrieved', 'info');
            
            // Create modal to show state
            const modal = document.createElement('div');
            modal.className = 'config-state-modal';
            modal.innerHTML = `
                <div class="a-overlay" onclick="this.parentElement.remove()">
                    <div class="a-modal" onclick="event.stopPropagation()">
                        <div class="a-modal__header">
                            <h3 class="a-modal__title">📊 Form State</h3>
                            <button type="button" class="a-modal__close" onclick="this.closest('.config-state-modal').remove()">
                                ×
                            </button>
                        </div>
                        <div class="a-modal__body">
                            <pre style="background: #f8f9fa; padding: 1rem; border-radius: 4px; overflow: auto; max-height: 400px;">${JSON.stringify(state, null, 2)}</pre>
                        </div>
                        <div class="a-modal__footer">
                            <button type="button" class="a-button a-button--secondary" onclick="this.closest('.config-state-modal').remove()">
                                Sluiten
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        };

        window.resetTestForm = function() {
            if (!systemReady || !window.formStateManager) {
                log('Cannot reset form - system not ready', 'error');
                return;
            }

            try {
                log('Resetting form state...');
                window.formStateManager.reset();
                
                // Re-render if form is visible
                const container = document.getElementById('testFormContainer');
                if (container.children.length > 0 && formRenderer) {
                    formRenderer.render('testFormContainer');
                }
                
                log('Form reset successful', 'success');
            } catch (error) {
                log(`Form reset error: ${error.message}`, 'error');
            }
        };

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            log('Page loaded, starting initialization...');
            updateSystemStatus();
            initConfigSystem();
        });
    </script>
</body>
</html>
