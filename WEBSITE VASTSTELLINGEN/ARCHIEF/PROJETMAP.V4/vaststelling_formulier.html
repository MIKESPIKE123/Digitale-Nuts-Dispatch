<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Vaststelling Formulier</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
    form { background: #fff; padding: 20px; border-radius: 5px; max-width: 600px; margin: auto; }
    label, select, input { display: block; margin-top: 10px; width: 100%; }
    button { margin-top: 20px; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Vaststelling Toevoegen</h1>
  <form onsubmit="event.preventDefault(); alert('Formulier verzonden!');">
    <label for="supervisor">Vaststeller:</label>
    <select id="supervisor" required><option value="">Kies...</option></select>

    <label for="postcode">Postcode:</label>
    <select id="postcode" required><option value="">Kies...</option></select>

    <label for="type">Type nutsmaatschappij:</label>
    <select id="type" required><option value="">Kies...</option></select>

    <label for="nuts">Nutsmaatschappij:</label>
    <select id="nuts" required><option value="">Kies...</option></select>

    <button type="submit">Opslaan</button>
    <p class="error" id="error-message"></p>
  </form>

  <script>
    fetch('data.json')
      .then(response => response.json())
      .then(data => {
        function populate(selectId, items) {
          const select = document.getElementById(selectId);
          items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item;
            opt.textContent = item;
            select.appendChild(opt);
          });
        }
        populate('supervisor', data.vaststellers);
        populate('postcode', data.postcodes);
        populate('type', data.types);
        populate('nuts', data.nutsmaatschappijen);
      })
      .catch(error => {
        console.error('Fout bij het laden:', error);
        document.getElementById('error-message').textContent = 'Kan gegevens niet laden uit data.json';
      });
  </script>
</body>
</html>
