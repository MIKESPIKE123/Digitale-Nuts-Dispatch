<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Config Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@a-ui/core@7.1.0/dist/main.min.css">
</head>
<body>
    <div class="u-container u-padding">
        <h1>🧪 Simple Config System Test</h1>
        
        <div class="a-panel">
            <div class="a-panel__body">
                <h2>Step-by-Step Test</h2>
                
                <button onclick="step1()" class="a-button u-margin-right-xs">1. Load Scripts</button>
                <button onclick="step2()" class="a-button u-margin-right-xs">2. Load Schema</button>
                <button onclick="step3()" class="a-button u-margin-right-xs">3. Init Managers</button>
                <button onclick="step4()" class="a-button">4. Render Form</button>
                
                <div id="output" class="u-margin-top" style="background: #f5f5f5; padding: 1rem; min-height: 200px; font-family: monospace;"></div>
                <div id="formContainer" class="u-margin-top"></div>
            </div>
        </div>
    </div>

    <script>
        function log(msg) {
            const output = document.getElementById('output');
            output.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '\n';
            console.log(msg);
        }

        let scriptsLoaded = false;
        let schemaLoaded = false;
        let managersReady = false;

        // Step 1: Load scripts
        function step1() {
            log('=== STEP 1: Loading Scripts ===');
            
            const scripts = [
                'src/state/formState.js',
                'src/state/visibility.js', 
                'src/ui/formRenderer.js',
                'src/services/historyStore.js',
                'src/services/export.js'
            ];

            let loadedCount = 0;
            
            scripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    loadedCount++;
                    log(`✅ Loaded: ${src}`);
                    if (loadedCount === scripts.length) {
                        scriptsLoaded = true;
                        log('🎉 All scripts loaded successfully!');
                        checkGlobals();
                    }
                };
                script.onerror = () => {
                    log(`❌ Failed to load: ${src}`);
                };
                document.head.appendChild(script);
            });
        }

        function checkGlobals() {
            log('--- Checking Global Objects ---');
            log('formStateManager: ' + (typeof window.formStateManager));
            log('visibilityManager: ' + (typeof window.visibilityManager));
            log('exportService: ' + (typeof window.exportService));
            log('historyStore: ' + (typeof window.historyStore));
            log('FormRenderer: ' + (typeof window.FormRenderer));
        }

        // Step 2: Load schema
        async function step2() {
            if (!scriptsLoaded) {
                log('❌ Run step 1 first!');
                return;
            }

            log('=== STEP 2: Loading Schema ===');
            
            try {
                const response = await fetch('./config/form.schema.json');
                log('Response status: ' + response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const schema = await response.json();
                window.testSchema = schema;
                schemaLoaded = true;
                
                log('✅ Schema loaded successfully');
                log('Blocks found: ' + (schema.blocks ? schema.blocks.length : 0));
                log('Fields found: ' + Object.keys(schema.fields || {}).length);
                
            } catch (error) {
                log('❌ Schema load failed: ' + error.message);
            }
        }

        // Step 3: Initialize managers
        function step3() {
            if (!scriptsLoaded || !schemaLoaded) {
                log('❌ Run steps 1 and 2 first!');
                return;
            }

            log('=== STEP 3: Initialize Managers ===');

            try {
                if (window.formStateManager) {
                    window.formStateManager.setSchema(window.testSchema);
                    log('✅ FormStateManager initialized');
                } else {
                    log('❌ FormStateManager not found');
                }

                if (window.visibilityManager) {
                    window.visibilityManager.setSchema(window.testSchema);
                    log('✅ VisibilityManager initialized');
                } else {
                    log('❌ VisibilityManager not found');
                }

                if (window.exportService) {
                    window.exportService.init(window.formStateManager);
                    log('✅ ExportService initialized');
                } else {
                    log('❌ ExportService not found');
                }

                managersReady = true;
                log('🎉 All managers initialized!');

            } catch (error) {
                log('❌ Manager initialization failed: ' + error.message);
            }
        }

        // Step 4: Render form
        function step4() {
            if (!managersReady) {
                log('❌ Run steps 1, 2, and 3 first!');
                return;
            }

            log('=== STEP 4: Render Form ===');

            try {
                if (window.FormRenderer) {
                    const renderer = new window.FormRenderer();
                    renderer.init(window.testSchema, window.formStateManager, window.visibilityManager);
                    renderer.render('formContainer');
                    log('✅ Form rendered successfully!');
                } else {
                    log('❌ FormRenderer not found');
                }
            } catch (error) {
                log('❌ Form rendering failed: ' + error.message);
                log('Error details: ' + error.stack);
            }
        }

        // Auto-start
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Page loaded. Click buttons to test step by step.');
        });
    </script>
</body>
</html>
