<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Signalisatie Visibility</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-field { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .hidden { display: none; }
        .visible { display: block; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Test Signalisatie Visibility Logica</h1>
    
    <div class="test-field">
        <h3>Signalisatie zichtbaar?</h3>
        <label>
            <input type="radio" name="visible" value="ja" onchange="testVisibility()"> Ja
        </label>
        <label>
            <input type="radio" name="visible" value="neen" onchange="testVisibility()"> Neen
        </label>
    </div>
    
    <div id="signalisatie_assessment" class="test-field" data-visibility='{"all":[{"field":"visible","equals":"ja"}]}'>
        <h3>Signalisatie Assessment (should show when "Ja")</h3>
        <select>
            <option>Test Assessment</option>
        </select>
    </div>
    
    <div id="signalisatie_begin_einde" class="test-field" data-visibility='{"all":[{"field":"visible","equals":"ja"}]}'>
        <h3>Signalisatie Begin/Einde (should show when "Ja")</h3>
        <label><input type="checkbox" value="begin_ok"> Begin OK</label>
        <label><input type="checkbox" value="einde_ok"> Einde OK</label>
    </div>
    
    <div class="debug" id="debug-log">
        <h4>Debug Log:</h4>
        <div id="log-content"></div>
    </div>

    <script>
        function log(message) {
            const logContent = document.getElementById('log-content');
            logContent.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + message + '</div>';
            console.log(message);
        }
        
        function getVal(id) {
            log(`Getting value for field: ${id}`);
            
            switch (id) {
                case 'visible':
                    const selectedRadio = document.querySelector(`input[name="${id}"]:checked`);
                    const value = selectedRadio ? selectedRadio.value : null;
                    log(`Field ${id} = "${value}"`);
                    return value;
                    
                default:
                    const element = document.getElementById(id);
                    const elementValue = element ? element.value : null;
                    log(`Field ${id} = "${elementValue}"`);
                    return elementValue;
            }
        }
        
        function evalVis(rules) {
            log(`Evaluating visibility rules: ${JSON.stringify(rules)}`);
            
            const testConditions = (conditions, mode) => {
                if (!Array.isArray(conditions)) return true;
                
                const results = conditions.map(condition => {
                    const fieldValue = getVal(condition.field);
                    
                    if ('equals' in condition) {
                        const result = fieldValue === condition.equals;
                        log(`Condition: ${condition.field} === "${condition.equals}" ? ${result} (actual: "${fieldValue}")`);
                        return result;
                    }
                    
                    return true;
                });
                
                const finalResult = mode === 'all' ? results.every(Boolean) : results.some(Boolean);
                log(`Mode: ${mode}, Results: [${results.join(', ')}], Final: ${finalResult}`);
                return finalResult;
            };
            
            if (rules.all) {
                return testConditions(rules.all, 'all');
            }
            
            if (rules.any) {
                return testConditions(rules.any, 'any');
            }
            
            return true;
        }
        
        function evaluateVisibility() {
            log('--- Evaluating field visibility ---');
            
            document.querySelectorAll('[data-visibility]').forEach(el => {
                try {
                    const rules = JSON.parse(el.dataset.visibility);
                    const isVisible = evalVis(rules);
                    const fieldId = el.id;
                    
                    log(`Field ${fieldId}: ${isVisible ? 'VISIBLE' : 'HIDDEN'}`);
                    
                    el.style.display = isVisible ? '' : 'none';
                    el.className = el.className.replace(/(visible|hidden)/g, '') + (isVisible ? ' visible' : ' hidden');
                } catch (e) {
                    log(`Error evaluating visibility for element ${el.id}: ${e.message}`);
                }
            });
            
            log('--- Visibility evaluation complete ---\n');
        }
        
        function testVisibility() {
            log('Radio button changed!');
            setTimeout(() => evaluateVisibility(), 50);
        }
        
        // Initial evaluation
        document.addEventListener('DOMContentLoaded', () => {
            log('Page loaded, initial evaluation');
            evaluateVisibility();
        });
    </script>
</body>
</html>
