<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Categorieën en Knoppen</title>
    <link href="css/styles.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; }
        .error { color: red; }
        .success { color: green; }
        .warning { color: orange; }
        button { margin: 5px; padding: 8px 12px; }
    </style>
</head>
<body>
    <h1>Test Categorieën en Knoppen Functionaliteit</h1>
    
    <div class="test-section">
        <h3>1. Test Schema Laden</h3>
        <button onclick="testSchema()">Test Schema</button>
        <div id="schemaResult"></div>
    </div>
    
    <div class="test-section">
        <h3>2. Test Actieve Categorieën</h3>
        <button onclick="testActiveGroups()">Test Actieve Groepen</button>
        <div id="activeGroupsResult"></div>
    </div>
    
    <div class="test-section">
        <h3>3. Test ConfigManager Interface</h3>
        <button onclick="testConfigManager()">Test ConfigManager</button>
        <div id="configManagerResult"></div>
        <div id="configManagerInterface"></div>
    </div>
    
    <div class="test-section">
        <h3>4. Test Specifieke Categorie</h3>
        <select id="testCategorySelect">
            <option value="">Selecteer een categorie...</option>
        </select>
        <button onclick="testSpecificCategory()">Test Categorie</button>
        <div id="specificCategoryResult"></div>
    </div>

    <script src="js/dataManager.js"></script>
    <script>
        let dataManager;
        
        function init() {
            console.log('Initializing test...');
            dataManager = new DataManager();
            
            setTimeout(() => {
                console.log('DataManager initialized');
                populateCategorySelect();
            }, 100);
        }
        
        function testSchema() {
            dataManager.ensureSchemaInitialized();
            
            const schema = dataManager.config?.schema;
            const result = document.getElementById('schemaResult');
            
            if (schema) {
                const groupCount = schema.configGroups ? schema.configGroups.length : 0;
                const fieldCount = schema.fieldTypes ? Object.keys(schema.fieldTypes).length : 0;
                
                result.innerHTML = `
                    <div class="success">
                        ✅ Schema geladen:<br>
                        - ${groupCount} configuratie groepen<br>
                        - ${fieldCount} veld types<br>
                        <small>Groepen: ${schema.configGroups ? schema.configGroups.map(g => g.key).join(', ') : 'geen'}</small>
                    </div>
                `;
            } else {
                result.innerHTML = `<div class="error">❌ Schema niet geladen!</div>`;
            }
        }
        
        function testActiveGroups() {
            const groups = dataManager.getActiveConfigGroups();
            const result = document.getElementById('activeGroupsResult');
            
            if (groups.length > 0) {
                let html = `<div class="success">✅ ${groups.length} actieve groepen gevonden:</div><ul>`;
                groups.forEach(group => {
                    html += `<li><strong>${group.key}</strong> - ${group.label} (${group.custom ? 'Custom' : 'Systeem'})</li>`;
                });
                html += '</ul>';
                result.innerHTML = html;
            } else {
                result.innerHTML = `<div class="error">❌ Geen actieve groepen gevonden!</div>`;
            }
        }
        
        function testConfigManager() {
            // Test of ConfigManager klasse beschikbaar is
            const result = document.getElementById('configManagerResult');
            const interfaceDiv = document.getElementById('configManagerInterface');
            
            if (typeof ConfigManager !== 'undefined') {
                result.innerHTML = `<div class="success">✅ ConfigManager klasse beschikbaar</div>`;
                
                // Creëer een mini interface voor test
                interfaceDiv.innerHTML = `
                    <h4>Mini ConfigManager Interface</h4>
                    <div id="configEditorTabs" style="margin: 10px 0;"></div>
                    <div id="configEditorContent" style="border: 1px solid #ddd; padding: 10px; min-height: 200px; background: white;"></div>
                `;
                
                // Initialiseer ConfigManager
                setTimeout(() => {
                    const configManager = new ConfigManager();
                    configManager.initUI();
                }, 100);
                
            } else {
                result.innerHTML = `<div class="error">❌ ConfigManager klasse niet gevonden!</div>`;
            }
        }
        
        function populateCategorySelect() {
            const groups = dataManager.getActiveConfigGroups();
            const select = document.getElementById('testCategorySelect');
            
            select.innerHTML = '<option value="">Selecteer een categorie...</option>';
            groups.forEach(group => {
                const option = document.createElement('option');
                option.value = group.key;
                option.textContent = `${group.label} (${group.key})`;
                select.appendChild(option);
            });
        }
        
        function testSpecificCategory() {
            const key = document.getElementById('testCategorySelect').value;
            const result = document.getElementById('specificCategoryResult');
            
            if (!key) {
                result.innerHTML = `<div class="warning">⚠️ Selecteer eerst een categorie</div>`;
                return;
            }
            
            const group = dataManager.getConfigGroup(key);
            const methodExists = group && typeof dataManager[group.method] === 'function';
            const addMethodExists = group && typeof dataManager[group.addMethod] === 'function';
            
            let html = `<h4>Test resultaat voor: ${key}</h4>`;
            
            if (group) {
                html += `<div class="success">✅ Groep gevonden: ${group.label}</div>`;
                html += `<p><strong>Method:</strong> ${group.method} ${methodExists ? '✅' : '❌'}</p>`;
                html += `<p><strong>Add Method:</strong> ${group.addMethod} ${addMethodExists ? '✅' : '❌'}</p>`;
                html += `<p><strong>Velden:</strong> ${group.fields.join(', ')}</p>`;
                
                if (methodExists) {
                    try {
                        const data = dataManager[group.method]();
                        html += `<p><strong>Data:</strong> ${data.length} items gevonden</p>`;
                    } catch (e) {
                        html += `<p><strong>Data:</strong> <span class="error">Fout bij ophalen: ${e.message}</span></p>`;
                    }
                }
            } else {
                html += `<div class="error">❌ Groep niet gevonden!</div>`;
            }
            
            result.innerHTML = html;
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
