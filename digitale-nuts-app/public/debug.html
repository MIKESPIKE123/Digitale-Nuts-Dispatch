<!DOCTYPE html>
<html>
<head>
    <title>localStorage Debug</title>
</head>
<body>
    <h1>localStorage Debug Tool</h1>
    <div id="output"></div>
    
    <script>
        function checkLocalStorage() {
            const output = document.getElementById('output');
            let html = '<h2>localStorage Contents:</h2>';
            
            // Check specific keys
            const configKey = 'inspectie-app-config';
            const oldKey = 'inspectionConfig';
            
            html += `<p><strong>${configKey}:</strong></p>`;
            const configData = localStorage.getItem(configKey);
            if (configData) {
                try {
                    const parsed = JSON.parse(configData);
                    html += `<pre style="background: #f0f0f0; padding: 10px; border-radius: 5px;">${JSON.stringify(parsed, null, 2)}</pre>`;
                } catch (e) {
                    html += `<p style="color: red;">Error parsing JSON: ${e.message}</p>`;
                    html += `<pre>${configData}</pre>`;
                }
            } else {
                html += '<p style="color: orange;">No data found for this key</p>';
            }
            
            html += `<p><strong>${oldKey} (old key):</strong></p>`;
            const oldData = localStorage.getItem(oldKey);
            if (oldData) {
                try {
                    const parsed = JSON.parse(oldData);
                    html += `<pre style="background: #f0f0f0; padding: 10px; border-radius: 5px;">${JSON.stringify(parsed, null, 2)}</pre>`;
                } catch (e) {
                    html += `<p style="color: red;">Error parsing JSON: ${e.message}</p>`;
                    html += `<pre>${oldData}</pre>`;
                }
            } else {
                html += '<p style="color: orange;">No data found for this key</p>';
            }
            
            // Show all localStorage keys
            html += '<h2>All localStorage Keys:</h2>';
            if (localStorage.length === 0) {
                html += '<p style="color: orange;">localStorage is empty</p>';
            } else {
                html += '<ul>';
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    html += `<li><strong>${key}</strong>: ${localStorage.getItem(key)?.substring(0, 100)}${localStorage.getItem(key)?.length > 100 ? '...' : ''}</li>`;
                }
                html += '</ul>';
            }
            
            output.innerHTML = html;
        }
        
        // Run immediately
        checkLocalStorage();
        
        // Add refresh button
        document.body.innerHTML += '<button onclick="checkLocalStorage()" style="margin-top: 20px; padding: 10px; font-size: 16px;">🔄 Refresh Check</button>' + document.body.innerHTML;
    </script>
</body>
</html>
